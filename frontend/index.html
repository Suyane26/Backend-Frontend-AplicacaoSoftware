<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Tarefas Avançado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerenciador de Tarefas</h1>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Nova tarefa...">
            <button id="addBtn">Adicionar</button>
        </div>

        <div class="filter-group">
            <button id="filterAll" class="filter-btn active">Todas</button>
            <button id="filterPending" class="filter-btn">Pendentes</button>
            <button id="filterCompleted" class="filter-btn">Concluídas</button>
        </div>

        <ul id="taskList"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
